name: Build Windows artifacts

on:
  #push:
  #  branches: [ main, master ]
  #pull_request:
  #  branches: [ main, master ]
  workflow_dispatch:
    inputs:
      target:
        description: 'Build target: msvc (default) or all'
        required: false
        default: 'msvc'

jobs:
  build-msvc:
    name: Build (Windows MSVC)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true
      - name: Build diviz-rs (MSVC)
        working-directory: diviz-rs
        env:
          RUSTFLAGS: "-C link-args=/DEFAULTLIB:Advapi32.lib"
        run: cargo build --release
      - name: Build dicor-rs (MSVC)
        working-directory: dicor-rs
        env:
          RUSTFLAGS: "-C link-args=/DEFAULTLIB:Advapi32.lib"
        run: cargo build --release
      - name: Upload dicor-rs MSVC artifact
        uses: actions/upload-artifact@v4
        with:
          name: dicor-rs-windows-msvc
          path: dicor-rs\\target\\release\\dicor-rs.exe
      - name: Build divue-rs (MSVC)
        working-directory: divue-rs
        env:
          RUSTFLAGS: "-C link-args=/DEFAULTLIB:Advapi32.lib"
        run: cargo build --release
      - name: Upload divue-rs MSVC artifact
        uses: actions/upload-artifact@v4
        with:
          name: divue-rs-windows-msvc
          path: divue-rs\\target\\release\\divue-rs.exe
      - name: Upload diviz-rs MSVC artifact
        uses: actions/upload-artifact@v4
        with:
          name: diviz-rs-windows-msvc
          path: diviz-rs\\target\\release\\diviz-rs.exe
      - name: Build release (MSVC)
        working-directory: uploader_rs
        env:
          RUSTFLAGS: "-C link-args=/DEFAULTLIB:Advapi32.lib"
        run: cargo build --release
      - name: Upload MSVC artifact
        uses: actions/upload-artifact@v4
        with:
          name: uploader-windows-msvc
          path: uploader_rs\\target\\release\\uploader_rs.exe

  build-uploader-only:
    name: Build uploader_rs (Windows only)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true
      - name: Build uploader_rs (MSVC)
        env:
          RUSTFLAGS: "-C link-args=/DEFAULTLIB:Advapi32.lib"
        run: cargo build --release -p uploader_rs
      - name: Upload uploader_rs MSVC artifact
        uses: actions/upload-artifact@v4
        with:
          name: uploader-windows-msvc-only
          path: uploader_rs\\target\\release\\uploader_rs.exe